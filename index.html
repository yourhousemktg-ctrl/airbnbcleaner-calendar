<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaner Payments Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar-app">
        <header class="app-header">
            <div class="title-section">
                <h1>Cleaner Payments</h1>
            </div>
            <div class="controls-section">
                <select id="property-select" class="property-select">
                    <option value="property-1">825</option>
                    <option value="property-2">circa now</option>
                </select>
                <div class="month-controls">
                    <button id="prev-month" class="icon-btn">&lt;</button>
                    <h2 id="current-month-year">March 2026</h2>
                    <button id="next-month" class="icon-btn">&gt;</button>
                </div>
                <button id="today-btn" class="today-btn">Today</button>
                <button id="admin-btn" class="today-btn" style="margin-left: 0.5rem; transition: all 0.2s;">🔒 Login</button>
            </div>
        </header>

        <div class="calendar-container">
            <div class="weekdays-header">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color legend-open"></div>
                <span>Open</span>
            </div>
            <div class="legend-item">
                <div class="legend-color legend-needs-cleaning"></div>
                <span>Needs Cleaning</span>
            </div>
            <div class="legend-item">
                <div class="legend-color legend-paid"></div>
                <span>Paid (<span class="money">$$$</span>)</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
